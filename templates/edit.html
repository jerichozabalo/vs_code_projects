<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Edit Expense</h1>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <ul>
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    {% endwith %}
    <form method="post">
        Amount: <input type="number" step="0.01" name="amount" value="{{ expense[1] }}" required><br>
        Category: <input type="text" name="category" value="{{ expense[2] }}" required><br>
        Description: <input type="text" name="description" value="{{ expense[3] }}" required><br>
        Date: <input type="date" name="date" value="{{ expense[4] }}" required><br>
        <input type="submit" value="Update">
    </form>
    <a href="{{ url_for('index') }}">Back</a>
</body>
</html>
